<style>


.skill {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}
.skill-label {
    width: 100px;
    font-weight: bold;
    text-align: left;
}
.skill-progress {
    flex-grow: 1;
    background-color: #e0e0e0;
    border-radius: 5px;
    overflow: hidden;
    position: relative;
}
.skill-progress-bar {
    height: 30px;
    background-color: #5dabff;
    text-align: center;
    line-height: 30px;
    color: white;
    border-radius: 5px;
}
.skill-percentage {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #0d00ff;
    font-weight: bold;
    background-color: rgba(207, 214, 255, 0.8);
    padding: 2px 5px;
    border-radius: 3px;
    border: 1px solid #393939;
}


.progress-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px; /* المسافة بين العناصر */
}




</style>
